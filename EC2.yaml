AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Windows con RDP

Parameters:
  VpcId:
    Type: String
  PublicSubnet:
    Type: String

Resources:

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir RDP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  MyEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base}}"

Outputs:
  EC2IP:
    Value: !GetAtt MyEC2.PublicIp
  EC2SG:
    Value: !Ref EC2SecurityGroup