AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 + RDS para laboratorio con acceso remoto y respaldos

Resources:

  #################################
  # SECURITY GROUPS
  #################################

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir SSH y RDP
      VpcId: !ImportValue Lab-VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir MySQL desde EC2
      VpcId: !ImportValue Lab-VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref InstanceSecurityGroup

  #################################
  # EC2 INSTANCE
  #################################

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: labsuser

      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !ImportValue PublicSubnet
          GroupSet:
            - !Ref InstanceSecurityGroup

      Tags:
        - Key: Name
          Value: Lab-EC2

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y

          # =========================
          # GUI + XRDP
          # =========================
          amazon-linux-extras install mate-desktop1.x -y
          yum groupinstall "MATE Desktop" -y

          yum install -y xrdp
          systemctl enable xrdp
          systemctl start xrdp
          systemctl set-default graphical.target

          # Usuario RDP
          useradd ec2user
          echo "ec2user:Password123!" | chpasswd

          echo "mate-session" > /home/ec2user/.Xclients
          chmod +x /home/ec2user/.Xclients
          chown ec2user:ec2user /home/ec2user/.Xclients

          # =========================
          # MYSQL CLIENT
          # =========================
          yum install -y mysql

          # =========================
          # MYSQL WORKBENCH (best effort)
          # =========================
          amazon-linux-extras enable epel
          yum install -y epel-release
          yum install -y mysql-workbench || true